<!DOCTYPE html>
<html>
<head>
<title>Memory Match</title>
<style>
body{
    background:#111;
    color:white;
    text-align:center;
    font-family:Arial;
}
#board{
    width:440px;
    margin:20px auto;
    display:grid;
    grid-template-columns:repeat(4,100px);
    gap:10px;
}
.card{
    width:100px;
    height:100px;
    background:#444;
    font-size:40px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
}
</style>
</head>
<body>

<h1>🧠 Memory Match</h1>

<div id="board"></div>

<script>
const symbols = ["🐶","🐶","🐱","🐱","🐸","🐸","🦊","🦊"];
symbols.sort(()=>Math.random()-0.5);

const board = document.getElementById("board");

let first = null;
let second = null;
let lock = false;

symbols.forEach(symbol=>{

    const card = document.createElement("div");
    card.className = "card";
    card.dataset.symbol = symbol;
    card.textContent = "?";

    card.onclick = ()=>{

        if(lock || card.textContent !== "?") return;

        card.textContent = symbol;

        if(!first){
            first = card;
        }else{
            second = card;
            lock = true;

            setTimeout(()=>{

                if(first.dataset.symbol !== second.dataset.symbol){
                    first.textContent = "?";
                    second.textContent = "?";
                }

                first = null;
                second = null;
                lock = false;

            },800);
        }
    };

    board.appendChild(card);
});
</script>

</body>
</html>
